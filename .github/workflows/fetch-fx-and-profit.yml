name: fetch fx and compute profit
on:
  schedule:
    - cron: '30 23 * * *'   # 매일 08:30 KST (KR/US 마감 후)
  push:
    paths:
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/fetch_fx_and_profit.py
      - name: Commit
        run: |
          git config user.email "auto-sync@cowork.local"
          git config user.name "github-actions"
          git add index.html
          git diff --cached --quiet || git commit -m "data: fx + profit_history 갱신 ($(date -u +%Y-%m-%d))"
          git push
