name: fetch kospi
on:
  schedule:
    - cron: '40 23 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 scripts/fetch_kospi.py
      - run: |
          git config user.email "auto-sync@cowork.local"
          git config user.name "github-actions"
          git add index.html
          git diff --cached --quiet || git commit -m "data: kospiByDate 갱신 ($(date -u +%Y-%m-%d))"
          git push
