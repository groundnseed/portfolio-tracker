// 4/27 기준 보유중 종목 (스냅샷 기준)
const heldStocks = new Set([
  '에치에프알','알지노믹스','상신이디피','PLUS 코스닥150액티브','인텔리안테크',
  '현대차','KODEX 코스닥150레버리지','한국항공우주','한화엔진','삼성전자',
  '현대건설','LIG넥스원','HD현대중공업','현대모비스'
]);

// ─── 종목별 보유 원가(running cost basis) 계산 (가중평균 기준) ───
const stockState = {};  // { stockName: { shares, costBasis, lastBuyAmount, points: [] } }
trades.forEach(t => {
  if (!stockState[t.stock]) {
    stockState[t.stock] = { shares: 0, costBasis: 0, lastBuyAmount: 0, points: [], events: [] };
  }
  const s = stockState[t.stock];
  const tradeAmount = t.qty * t.price;
  if (t.side === 'buy') {
    s.shares += t.qty;
    s.costBasis += tradeAmount;
    s.lastBuyAmount = tradeAmount;
  } else {
    // 가중평균 기준으로 비례 차감
    if (s.shares > 0) {
      const avgCost = s.costBasis / s.shares;
      const reduction = avgCost * t.qty;
      s.costBasis = Math.max(0, s.costBasis - reduction);
      s.shares = Math.max(0, s.shares - t.qty);
    }
  }
  s.points.push({ x: t.date, y: s.costBasis });
  s.events.push({ x: t.date, y: tradeAmount, side: t.side, qty: t.qty, price: t.price });
});

// 날짜 문자열을 timestamp (ms)로 변환 — Chart.js time scale용
Object.values(stockState).forEach(s => {
  s.points.forEach(p => p.x = new Date(p.x).getTime());
  s.events.forEach(e => e.x = new Date(e.x).getTime());
});

// ─── 종목 색상 팔레트 ───
const palette = [
  '#e91e63','#2196f3','#4caf50','#ff9800','#9c27b0',
  '#00bcd4','#f44336','#3f51b5','#8bc34a','#ff5722',
  '#673ab7','#009688','#ffc107','#795548','#607d8b',
  '#e91e63','#03a9f4','#cddc39','#ff6f00','#5e35b1',
  '#00897b','#c2185b','#7cb342'
];

// ─── 종목 정렬: 마지막 매입금액 큰 순 ───
const stockNames = Object.keys(stockState).sort((a,b) =>
  (stockState[b].lastBuyAmount || 0) - (stockState[a].lastBuyAmount || 0)
);

// 색상 할당
const stockColor = {};
stockNames.forEach((name, i) => stockColor[name] = palette[i % palette.length]);

// ─── 사이드바 종목 목록 렌더 ───
const stockListEl = document.getElementById('stockList');
const visibleStocks = new Set(stockNames);

stockNames.forEach(name => {
  const item = document.createElement('label');
  item.className = 'stock-item' + (heldStocks.has(name) ? '' : ' disabled');
  item.dataset.stock = name;
  item.innerHTML = `
    <input type="checkbox" checked />
    <span class="swatch" style="background:${stockColor[name]}"></span>
    <span class="name">${name}</span>
  `;
  item.querySelector('input').addEventListener('change', e => {
    if (e.target.checked) visibleStocks.add(name);
    else visibleStocks.delete(name);
    updateChart();
  });
  stockListEl.appendChild(item);
});

// ─── 필터 버튼 ───
document.querySelectorAll('.filter-buttons button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    visibleStocks.clear();
    stockNames.forEach(name => {
      const isHeld = heldStocks.has(name);
      const show = (filter === 'all') || (filter === 'held' && isHeld) || (filter === 'closed' && !isHeld);
      if (show) visibleStocks.add(name);
      const item = document.querySelector(`.stock-item[data-stock="${CSS.escape(name)}"]`);
      if (item) item.querySelector('input').checked = show;
    });
    updateChart();
  });
});

// ─── 커스텀 ▲▼ 마커 플러그인 ───
const triangleMarkers = {
  id: 'triangleMarkers',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, dsIdx) => {
      if (!ds._isEvents) return;
      const meta = chart.getDatasetMeta(dsIdx);
      if (meta.hidden) return;
      ds.data.forEach((pt, i) => {
        const px = meta.data[i];
        if (!px || isNaN(px.x) || isNaN(px.y)) return;
        // 매수 = 빨강 ▲, 매도 = 파랑 ▼
        const color = pt.side === 'buy' ? '#e53935' : '#1e88e5';
        ctx.save();
        ctx.fillStyle = color;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const size = 7;
        if (pt.side === 'buy') {
          ctx.moveTo(px.x, px.y - size);
          ctx.lineTo(px.x - size, px.y + size*0.7);
          ctx.lineTo(px.x + size, px.y + size*0.7);
        } else {
          ctx.moveTo(px.x, px.y + size);
          ctx.lineTo(px.x - size, px.y - size*0.7);
          ctx.lineTo(px.x + size, px.y - size*0.7);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });
    });
  }
};

// ─── 차트 생성 ───
const ctx = document.getElementById('chart').getContext('2d');

function buildDatasets() {
  const datasets = [];
  stockNames.forEach(name => {
    if (!visibleStocks.has(name)) return;
    const s = stockState[name];
    const color = stockColor[name];
    // 보유 원가 라인 (스텝)
    datasets.push({
      label: name + ' (원가)',
      data: s.points,
      borderColor: color,
      backgroundColor: color,
      pointRadius: 0,
      borderWidth: 1.8,
      stepped: 'after',
      tension: 0,
      fill: false,
      _isLine: true
    });
    // ▲▼ 마커 (매입금액 위치)
    datasets.push({
      label: name,
      data: s.events,
      borderColor: color,
      backgroundColor: color,
      pointRadius: 0,
      showLine: false,
      _isEvents: true
    });
  });
  return datasets;
}

const chart = new Chart(ctx, {
  type: 'line',
  data: { datasets: buildDatasets() },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'nearest', axis: 'xy', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: items => items[0]?.raw?.x ? new Date(items[0].raw.x).toISOString().slice(0,10) : '',
          label: ctx => {
            const ds = ctx.dataset;
            const r = ctx.raw;
            const name = ds.label.replace(' (원가)','');
            if (ds._isEvents) {
              const sideStr = r.side === 'buy' ? '매수 ▲' : '매도 ▼';
              return `${name} ${sideStr}: ${r.qty.toLocaleString()}주 × ${r.price.toLocaleString()}원 = ${r.y.toLocaleString()}원`;
            } else if (ds._isLine) {
              return `${name} 보유원가: ${Math.round(r.y).toLocaleString()}원`;
            }
            return '';
          }
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'week', displayFormats: { week: 'yyyy-MM-dd' } },
        ticks: { color: '#6b7280', font: { size: 11 } },
        grid: { color: '#eef0f4' }
      },
      y: {
        title: { display: true, text: '매입금액 (KRW)', color: '#6b7280', font: { size: 11 } },
        ticks: {
          color: '#6b7280',
          font: { size: 11 },
          callback: v => {
            if (v >= 1e8) return (v/1e8).toFixed(1)+'억';
            if (v >= 1e4) return (v/1e4).toFixed(0)+'만';
            return v.toLocaleString();
          }
        },
        grid: { color: '#eef0f4' },
        beginAtZero: true
      }
    }
  },
  plugins: [triangleMarkers]
});

function updateChart() {
  chart.data.datasets = buildDatasets();
  chart.update();
}

];
const totalValue = portfolioSnapshot.reduce((s,h)=>s+h.value, 0);
portfolioSnapshot.forEach(h => h.weight = h.value / totalValue * 100);

function returnColor(r) {
  if (r > 0) {
    const t = Math.min(1, r/100);
    return `rgb(${Math.round(195-t*155)},${Math.round(180-t*40)},${Math.round(150-t*60)})`;
  } else if (r < 0) {
    const t = Math.min(1, Math.abs(r)/30);
    return `rgb(${Math.round(220+t*15)},${Math.round(140-t*80)},${Math.round(140-t*80)})`;
  }
  return '#aaa';
}

const bubbleData = portfolioSnapshot.map(h => ({
  x: h.weight, y: h.ret,
  r: Math.max(5, Math.sqrt(h.value/totalValue)*60),
  name: h.name, value: h.value
}));

new Chart(document.getElementById('bubbleChart').getContext('2d'), {
  type: 'bubble',
  data: {
    datasets: [{
      data: bubbleData,
      backgroundColor: portfolioSnapshot.map(h => returnColor(h.ret)),
      borderColor: '#fff',
      borderWidth: 1.5
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: 24 },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: c => [
            c.raw.name,
            `비중: ${c.raw.x.toFixed(2)}%`,
            `수익률: ${c.raw.y >= 0 ? '+' : ''}${c.raw.y.toFixed(2)}%`,
            `평가금액: ${c.raw.value.toLocaleString()}원`
          ]
        }
      }
    },
    scales: {
      x: {
        title: { display: true, text: '비중 (%)' },
        min: -2, max: 35,
        ticks: { color: '#6b7280' },
        grid: { color: 'rgba(0,0,0,0.06)' }
      },
      y: {
        title: { display: true, text: '수익률 (%)' },
        min: -30, max: 110,
        ticks: { color: '#6b7280', callback: v => (v>=0?'+':'')+v+'%' },
        grid: { color: 'rgba(0,0,0,0.06)' }
      }
    }
  },
  plugins: [{
    id: 'quadrants',
    afterDraw(chart) {
      const { ctx, chartArea: ca, scales: { x, y } } = chart;
      const x0 = x.getPixelForValue(0);
      const y0 = y.getPixelForValue(0);
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0);
      ctx.moveTo(x0, ca.top); ctx.lineTo(x0, ca.bottom);
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font = '11px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillText('⭐ 핵심 winner', ca.right - 105, ca.top + 16);
      ctx.fillText('📈 추가매수 후보', ca.left + 8, ca.top + 16);
      ctx.fillText('⚠️ 위험', ca.right - 60, ca.bottom - 10);
      ctx.fillText('✂️ 컷 후보', ca.left + 8, ca.bottom - 10);
      ctx.restore();
      ctx.save();
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = '#222';
      ctx.textAlign = 'center';
      chart.data.datasets[0].data.forEach(p => {
        const px = x.getPixelForValue(p.x);
        const py = y.getPixelForValue(p.y);
        if (p.r > 12) ctx.fillText(p.name, px, py + 3);
      });
      ctx.restore();
    }
  }]
});
</script>
</body>
</html>
